<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- The Void (Transparent background, but the focal point is central) -->

  <!-- Planet -->
  <circle cx="32" cy="32" r="18" fill="url(#planet_grad)" />
  <circle cx="32" cy="32" r="18" fill="url(#planet_overlay)" fill-opacity="0.3" />

  <!-- Subtle Ring -->
  <ellipse cx="32" cy="32" rx="28" ry="6" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.4" transform="rotate(-15 32 32)" />

  <!-- Stars -->
  <circle cx="12" cy="15" r="1.5" fill="#f1f5f9" fill-opacity="0.8" />
  <circle cx="50" cy="10" r="1" fill="#f1f5f9" fill-opacity="0.6" />
  <circle cx="55" cy="45" r="1.2" fill="#f1f5f9" fill-opacity="0.7" />
  <circle cx="15" cy="52" r="0.8" fill="#f1f5f9" fill-opacity="0.5" />
  <circle cx="32" cy="8" r="0.5" fill="#f1f5f9" fill-opacity="0.9" />

  <defs>
    <linearGradient id="planet_grad" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c084fc" />
      <stop offset="1" stop-color="#581c87" />
    </linearGradient>
    <radialGradient id="planet_overlay" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" transform="translate(24 24) rotate(45) scale(20)">
      <stop stop-color="white" />
      <stop offset="1" stop-color="white" stop-opacity="0" />
    </radialGradient>
  </defs>
</svg>
